name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python agent tests ───────────────────────────────────────────────────
  test-agent:
    name: Agent Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r agent/requirements-dev.txt

      - name: Run pytest
        run: cd agent && python -m pytest tests/ -v --tb=short

  # ── Solidity contract tests ──────────────────────────────────────────────
  test-contracts:
    name: Contract Tests (Hardhat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install Hardhat
        run: cd contracts && npm ci

      - name: Compile contracts
        run: cd contracts && npx hardhat compile

      - name: Run tests
        run: cd contracts && npx hardhat test

  # ── Frontend build ───────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Check bundle size
        run: |
          du -sh frontend/dist/assets/*.js | sort -h
          echo "Build OK"
