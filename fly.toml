# Fly.io deployment config for Mongli_Agent_IA Python agent
# Deploy: fly launch --no-deploy && fly secrets set AGENT_PRIVATE_KEY=0x... && fly deploy

app            = "mongli-agent-ia"
primary_region = "iad"

[build]
  dockerfile = "agent/Dockerfile"

[env]
  FASTAPI_PORT            = "8000"
  FASTAPI_HOST            = "0.0.0.0"
  SCAN_INTERVAL_SECONDS   = "30"
  MIN_CONFIDENCE_THRESHOLD = "70"
  WHALE_THRESHOLD_MNT     = "10000"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/"
    timeout      = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
