version: "3.9"

# Mongli_Agent_IA — Docker Compose
# Usage:
#   1. Copy .env.example to .env and fill in your keys
#   2. docker compose up -d

services:

  # ── Python Agent ──────────────────────────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: mongli-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - agent-logs:/app/logs
      - agent-models:/app/models
    networks:
      - mongli-net
    healthcheck:
      test: ["CMD", "python", "-c", "from config import cfg; print(cfg.active_rpc)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI REST ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: mongli-api
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - agent-logs:/app/logs
    networks:
      - mongli-net
    depends_on:
      - agent

volumes:
  agent-logs:
  agent-models:

networks:
  mongli-net:
    driver: bridge
